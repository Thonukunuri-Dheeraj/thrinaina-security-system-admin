    display: none;
  }

/* Scanner Sweep Animation for CCTV Monitor Vibe */

.cctv-radar {
    background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
  }

/* CCTV Surveillance Background - applied to main wrapper */

.cctv-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  /* Radial vignette and top glow only (no grid lines) */
  background:
    /* Radial vignette (dark corners like a camera lens) */
    radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(8, 12, 28, 0.75) 100%),
    /* Top glow accent */
    radial-gradient(ellipse at 50% 0%, rgba(30, 58, 138, 0.18) 0%, transparent 50%);
  background-size: 100% 100%, 100% 100%;
  background-position: center, center;
}

/* Animations */

@keyframes pulse-slow {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

.animate-pulse-slow {
  animation: pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

@keyframes sweep {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

.animate-sweep {
  animation: sweep 8s linear infinite;
}

@keyframes scanline-sweep {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

.animate-scanline-sweep {
  animation: scanline-sweep 4s linear infinite;
}

@keyframes radar-rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.animate-radar-rotate {
  animation: radar-rotate 6s linear infinite;
}

@keyframes led-blink {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.animate-led-blink {
  animation: led-blink 1.5s infinite;
}

.animate-led-blink-fast {
  animation: led-blink 0.4s infinite;
}

@keyframes laser-grid-pan {
  0% { transform: translateY(-100%); opacity: 0.2; }
  50% { opacity: 0.7; }
  100% { transform: translateY(100%); opacity: 0.2; }
}

.animate-laser-grid-pan {
  animation: laser-grid-pan 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}

/* CRT Screen Scanline/Noise Overlay */

.crt-overlay {
  background: 
    linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
    linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
  background-size: 100% 3px, 3px 100%;
}

/* CCTV grid pattern */

.security-grid-overlay {
  background-image: 
    linear-gradient(rgba(201, 168, 76, 0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 168, 76, 0.1) 1px, transparent 1px);
  background-size: 24px 24px;
}

@keyframes bullet-pan {
  0%, 100% { transform: rotate(-25deg); }
  50% { transform: rotate(20deg); }
}

.animate-bullet-pan {
  animation: bullet-pan 5s ease-in-out infinite;
}

@keyframes dome-scan {
  0%, 100% { transform: rotate(-35deg); }
  50% { transform: rotate(35deg); }
}

.animate-dome-scan {
  animation: dome-scan 4s ease-in-out infinite;
}

@keyframes scan-cone {
  0%, 100% { transform: skewX(-12deg) scaleX(0.9); opacity: 0.15; }
  50% { transform: skewX(12deg) scaleX(1.1); opacity: 0.35; }
}

.animate-scan-cone {
  animation: scan-cone 5s ease-in-out infinite;
}

@keyframes laser-sweep {
  0%, 100% { transform: translateY(-5px); opacity: 0.2; }
  50% { transform: translateY(85px); opacity: 0.7; }
}

.animate-laser-sweep {
  animation: laser-sweep 3s ease-in-out infinite;
}

/* Custom Scrollbar */

::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: #101830;
}

::-webkit-scrollbar-thumb {
  background: #1C2540;
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: #2A3F6F;
}

/* Premium fadeInUp entry animations */

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-in-up {
  animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.animation-delay-75 {
  animation-delay: 75ms;
}

.animation-delay-150 {
  animation-delay: 150ms;
}

.animation-delay-225 {
  animation-delay: 225ms;
}

.animation-delay-300 {
  animation-delay: 300ms;
}

/* Premium logo login verification animation */

@keyframes logoPulseGlow {
  0%, 100% {
    transform: scale(1);
    filter: drop-shadow(0 0 4px rgba(201, 168, 76, 0.3));
  }
  50% {
    transform: scale(1.08);
    filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.8));
  }
}

.animate-logo-loading {
  animation: logoPulseGlow 1.2s ease-in-out infinite;
}

/* Premium growing bar animations for SVG charts */

@keyframes growBar {
  from {
    transform: scaleY(0);
    opacity: 0;
  }
  to {
    transform: scaleY(1);
    opacity: 1;
  }
}

.animate-grow-bar {
  transform-box: fill-box;
  transform-origin: bottom;
  opacity: 0;
  animation: growBar 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.bar-delay-0 { animation-delay: 150ms; }

.bar-delay-1 { animation-delay: 250ms; }

.bar-delay-2 { animation-delay: 350ms; }

.bar-delay-3 { animation-delay: 450ms; }

.bar-delay-4 { animation-delay: 550ms; }

.bar-delay-5 { animation-delay: 650ms; }

/* Preloader Splash Welcome Animations */

  from {
    opacity: 0;
    transform: scale(0.85);
    filter: blur(4px);
  }
  to {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
  }
}

.animate-fade-in-scale {
  animation: fadeInScale 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

@keyframes loadingBar {

    width: 0%;
  }
  to {
    width: 100%;
  }
}

.animate-loading-bar {
